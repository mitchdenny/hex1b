<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Quad Terminal Demo</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@6.0.0/css/xterm.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; background: #0a0a12; overflow: hidden; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; height: 100%; gap: 8px; padding: 8px; }
        .terminal-pane { background: #0f0f1a; overflow: hidden; border-radius: 6px; padding: 8px; }
        .terminal-pane .label { color: #666; font-family: monospace; font-size: 11px; padding-bottom: 4px; }
    </style>
</head>
<body>
    <div class="grid">
        <div id="term1" class="terminal-pane"><div class="label">Loading terminal 1...</div></div>
        <div id="term2" class="terminal-pane"><div class="label">Loading terminal 2...</div></div>
        <div id="term3" class="terminal-pane"><div class="label">Loading terminal 3...</div></div>
        <div id="term4" class="terminal-pane"><div class="label">Loading terminal 4...</div></div>
    </div>
    <script type="module">
        import { Terminal } from 'https://cdn.jsdelivr.net/npm/@xterm/xterm@6.0.0/+esm';
        import { FitAddon } from 'https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.11.0/+esm';

        const theme = { background: '#0f0f1a', foreground: '#e0e0e0' };
        const terminals = [];
        const paneIds = ['term1', 'term2', 'term3', 'term4'];

        function createTerminal(containerId, config) {
            const container = document.getElementById(containerId);
            const termDiv = document.createElement('div');
            termDiv.style.height = 'calc(100% - 20px)';
            container.appendChild(termDiv);

            const termOptions = {
                cursorBlink: true,
                fontSize: 13,
                theme
            };
            if (config.windowsPty) {
                termOptions.windowsPty = {
                    backend: config.windowsPty.backend,
                    buildNumber: config.windowsPty.buildNumber
                };
            }

            const term = new Terminal(termOptions);
            const fitAddon = new FitAddon();
            term.loadAddon(fitAddon);
            term.open(termDiv);
            fitAddon.fit();

            const endpointUrl = new URL(
                `${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}${config.endpoint}`);
            endpointUrl.searchParams.set('cols', term.cols);
            endpointUrl.searchParams.set('rows', term.rows);
            const ws = new WebSocket(endpointUrl.toString());
            const sendResize = (cols, rows) => {
                if (ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({ type: 'resize', cols, rows }));
                }
            };
            ws.onmessage = e => term.write(e.data);
            ws.onopen = () => sendResize(term.cols, term.rows);
            term.onData(data => ws.send(data));
            
            // Send resize when terminal dimensions actually change
            term.onResize(({ cols, rows }) => {
                sendResize(cols, rows);
            });

            return { term, fitAddon, ws };
        }

        const terminalConfigs = await fetch('/terminal-config').then(response => response.json());
        terminalConfigs.forEach((config, index) => {
            const container = document.getElementById(paneIds[index]);
            container.querySelector('.label').textContent = config.label;
            terminals.push(createTerminal(paneIds[index], config));
        });

        window.onresize = () => terminals.forEach(({ fitAddon }) => fitAddon.fit());
    </script>
</body>
</html>
